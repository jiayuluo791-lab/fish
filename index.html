<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家渝的个人鱼塘</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { 
            background-image: url("dist/assets/img/water.jpg");
            background-size: cover; background-position: center;
            background-attachment: fixed; background-repeat: no-repeat;
            background-color: #e0f7fa; 
        }
        
        #profile-avatar {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 220px; border-radius: 50%; border: 8px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.6); z-index: 5; object-fit: cover;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-15px); } }

        /* 🐟 鱼容器：文字防镜像 */
        .fish { position: absolute; cursor: pointer; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .fish img { width: 80px; height: auto; transition: transform 0.1s; }
        .fish div { font-size: 14px; color: #00796b; font-weight: bold; text-align: center; margin-top: 5px; }

        /* 遮罩层 */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.05); backdrop-filter: blur(8px); z-index: 90; }

        /* 🧼 泡泡基础样式 */
        .bubble-common {
            position: fixed; border-radius: 50%; border: 1px solid rgba(255,255,255,0.6);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.5), rgba(178, 235, 242, 0.2));
            backdrop-filter: blur(3px); display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 100; color: #00796b; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 破碎的小碎泡泡 */
        .tiny-bubble {
            position: fixed; background: rgba(255, 255, 255, 0.5); border-radius: 50%;
            pointer-events: none; z-index: 99; animation: fall 1.5s ease-out forwards;
        }
        @keyframes fall {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(80px) scale(0); opacity: 0; }
        }

        /* 统一大弹窗样式 (基础信息/实习等使用) */
        #main-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 800px; padding: 40px; border-radius: 30px;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            z-index: 110; box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }

        /* 兴趣爱好详情卡片 (三级弹窗) */
        #detail-card {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 480px; padding: 35px; border-radius: 25px;
            background: rgba(255,255,255,1); z-index: 120; box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            /* 确保内部溢出内容（如海报）可以控制 */
            overflow: hidden; 
        }

        .close-x { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; color: #ccc; z-index: 10; }

        /* =========================================
           ✨ 核心修改 1：海报舒展开的 CSS 动画 ✨
           ========================================= */
        #poster-container {
            width: 100%;
            /* 初始高度为 0，隐藏 */
            max-height: 0; 
            overflow: hidden;
            margin-top: 15px;
            /* 关键：舒展开的过渡效果 */
            transition: max-height 1s ease-in-out; 
            text-align: center;
        }

        /* 当添加 .unfold 类时，max-height 变大，图片舒展开 */
        #poster-container.unfold {
            /* 设置一个足够大的值，确保海报能完全显示 */
            max-height: 600px; 
        }

        #swim-poster {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* 基础信息内容排版 */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        .info-section { background: rgba(0,150,136,0.03); padding: 15px; border-radius: 12px; }
        .tag { display: inline-block; background: #e0f2f1; color: #00796b; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; font-weight: bold; }
    </style>
</head>
<body>

<img id="profile-avatar" src="dist/assets/img/profile.jpg">
<div id="overlay" onclick="closeAll()"></div>

<div id="main-modal">
    <div class="close-x" onclick="closeAll()">×</div>
    <h2 id="main-title" style="color:#00796b; margin-top:0;"></h2>
    <div id="main-content"></div>
</div>

<div id="detail-card">
    <div class="close-x" onclick="closeDetail()">×</div>
    <h2 id="detail-title" style="color:#00796b; margin-top:0;"></h2>
    <div id="detail-content" style="line-height:1.8; color:#444"></div>
    
    <div id="poster-container">
        <img src="dist/assets/img/游泳.png" id="swim-poster" alt="游泳海报">
    </div>
</div>

<script>
    const hobbyData = {
        '网球': '热爱挥洒汗水的快感，网球不仅是运动，更是对节奏和爆发力的掌控。',
        '游泳': '在水底世界寻找宁静，享受每一次划水带来的自由感。',
        '追星': '记录美好瞬间，学习优秀偶像的闪光点，也是一种生活动力。',
        '旅游': '看遍广东的山水，也向往更远的远方。喜欢策划路线，挖掘小众打卡地。'
    };

    const fishData = [
        { 
            title: '基础信息', 
            details: `
                <div class="info-grid">
                    <div class="info-section">
                        <h4 style="margin:0 0 10px 0; color:#00796b;">👤 个人概况</h4>
                        <b>姓名：</b>罗家渝<br>
                        <b>专业：</b>华南农业大学 · 农林经济管理<br>
                        <b>政治面貌：</b>中共预备党员<br>
                        <b>时间线：</b>2023 - 2027 (本科)
                    </div>
                    <div class="info-section">
                        <h4 style="margin:0 0 10px 0; color:#00796b;">📍 联系方式</h4>
                        <b>籍贯：</b>广东东莞 / <b>现居：</b>广州天河<br>
                        <b>电话：</b>18998055663<br>
                        <b>邮箱：</b>2304362354@qq.com
                    </div>
                    <div class="info-section" style="grid-column: span 2;">
                        <h4 style="margin:0 0 10px 0; color:#00796b;">🏆 荣誉与语言</h4>
                        <span class="tag">CET-4</span> <span class="tag">CET-6</span>
                        <div style="margin-top:8px;">🏅 <b>曾连续两年获得校级奖学金</b></div>
                    </div>
                    <div class="info-section" style="grid-column: span 2;">
                        <h4 style="margin:0 0 10px 0; color:#00796b;">💻 专业技能</h4>
                        <b>数据：</b>计算机二级、精通 Excel 数据透视表分析<br>
                        <b>视觉：</b>Figma、PS、Canva、秀米 (独立设计能力)<br>
                        <b>视频：</b>剪映 (独立完成短视频策划与制作)
                    </div>
                </div>
            `
        },
        { title: '实习简历', details: '<p style="text-align:center; padding:50px;">实习经历正在整理中，敬请期待...</p>' },
        { title: '项目经历', details: '<p style="text-align:center; padding:50px;">Tada App 推广项目细节正在录入...</p>' },
        { title: '我的自媒体', details: '<p style="text-align:center; padding:50px;">自媒体运营数据与作品展示准备中...</p>' },
        { title: '性格与爱好', type: 'special' }
    ];

    // 初始化鱼群
    fishData.forEach((data) => {
        const fish = document.createElement('div');
        fish.className = 'fish';
        fish.innerHTML = `<img src="dist/assets/img/fish1.png"><div>${data.title}</div>`;
        document.body.appendChild(fish);
        
        let posX = Math.random() * (window.innerWidth - 100);
        let posY = Math.random() * (window.innerHeight - 100);
        let velX = (Math.random() - 0.5) * 2;
        let velY = (Math.random() - 0.5) * 2;

        function move() {
            posX += velX; posY += velY;
            if (posX < 0 || posX > window.innerWidth - 80) velX *= -1;
            if (posY < 0 || posY > window.innerHeight - 80) velY *= -1;
            fish.style.left = posX + 'px';
            fish.style.top = posY + 'px';
            const img = fish.querySelector('img');
            img.style.transform = velX > 0 ? 'scaleX(1)' : 'scaleX(-1)';
            requestAnimationFrame(move);
        }
        move();

        fish.onclick = () => {
            if (data.type === 'special') startHobbyFlow();
            else showNormalModal(data.title, data.details);
        };
    });

    // 展示普通内容 (基础信息/简历等)
    function showNormalModal(title, content) {
        document.getElementById('overlay').style.display = 'block';
        const m = document.getElementById('main-modal');
        document.getElementById('main-title').innerText = title;
        document.getElementById('main-content').innerHTML = content;
        m.style.display = 'block';
    }

    // ✨ 华丽破碎流：兴趣爱好
    function startHobbyFlow() {
        document.getElementById('overlay').style.display = 'block';
        const big = document.createElement('div');
        big.className = 'bubble-common';
        big.style.width = '160px'; big.style.height = '160px';
        big.style.left = 'calc(50% - 80px)'; big.style.top = 'calc(50% - 80px)';
        big.style.fontSize = '18px'; big.style.fontWeight = 'bold';
        big.innerText = '性格与爱好'; big.style.display = 'flex';
        document.body.appendChild(big);

        big.onclick = (e) => {
            e.stopPropagation();
            // 碎裂动画
            big.style.transform = 'scale(1.8)'; big.style.opacity = '0';
            for(let i=0; i<12; i++) createTinyBubble(window.innerWidth/2, window.innerHeight/2);
            setTimeout(() => big.remove(), 300);

            // 弹出小泡泡
            const hobbies = Object.keys(hobbyData);
            hobbies.forEach((name, i) => {
                const sub = document.createElement('div');
                sub.className = 'bubble-common sub-h';
                sub.style.width = '85px'; sub.style.height = '85px';
                sub.innerText = name; sub.style.display = 'flex';
                sub.style.left = (window.innerWidth/2 - 42) + 'px';
                sub.style.top = (window.innerHeight/2 - 42) + 'px';
                document.body.appendChild(sub);

                const angle = (i / hobbies.length) * Math.PI * 2;
                const dist = 190;
                setTimeout(() => {
                    sub.style.left = (window.innerWidth/2 - 42 + Math.cos(angle) * dist) + 'px';
                    sub.style.top = (window.innerHeight/2 - 42 + Math.sin(angle) * dist) + 'px';
                }, 50);

                sub.onclick = (ev) => {
                    ev.stopPropagation();
                    
                    // =========================================
                    // ✨ 核心修改 3：JavaScript 逻辑 ✨
                    // =========================================
                    document.getElementById('detail-title').innerText = name;
                    document.getElementById('detail-content').innerText = hobbyData[name];
                    
                    const posterContainer = document.getElementById('poster-container');
                    
                    // 判断是否点击了“游泳”
                    if (name === '游泳') {
                        // 显示海报容器，并添加展开动画类
                        posterContainer.style.display = 'block';
                        // 稍微延迟一点添加类，确保 display:block 生效后再执行过渡动画
                        setTimeout(() => {
                            posterContainer.classList.add('unfold');
                        }, 50);
                    } else {
                        // 如果点击其他爱好，隐藏海报容器并移除类
                        posterContainer.classList.remove('unfold');
                        posterContainer.style.display = 'none';
                    }
                    
                    document.getElementById('detail-card').style.display = 'block';
                };
            });
        };
    }

    function createTinyBubble(x, y) {
        const t = document.createElement('div');
        t.className = 'tiny-bubble';
        const size = Math.random() * 10 + 5;
        t.style.width = size + 'px'; t.style.height = size + 'px';
        t.style.left = x + (Math.random()-0.5)*80 + 'px';
        t.style.top = y + (Math.random()-0.5)*80 + 'px';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 1500);
    }

    // 关闭爱好详情时，重置海报状态
    function closeDetail() { 
        document.getElementById('detail-card').style.display = 'none'; 
        // 关键：关闭时移除展开类，让 max-height 回到 0
        document.getElementById('poster-container').classList.remove('unfold');
    }
    
    function closeAll() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('main-modal').style.display = 'none';
        document.getElementById('detail-card').style.display = 'none';
        // 关键：关闭所有时也要重置海报
        document.getElementById('poster-container').classList.remove('unfold');
        document.querySelectorAll('.bubble-common').forEach(b => b.remove());
    }
</script>
</body>
